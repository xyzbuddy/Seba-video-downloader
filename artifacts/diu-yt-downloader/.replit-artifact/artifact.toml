kind = "web"
previewPath = "/"
title = "DIU YT Downloader"
version = "1.0.0"
id = "artifacts/diu-yt-downloader"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21632

[services.development]
run = "pnpm --filter @workspace/diu-yt-downloader run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/diu-yt-downloader", "run", "build" ]
publicDir = "artifacts/diu-yt-downloader/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21632"
BASE_PATH = "/"
